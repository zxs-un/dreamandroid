name: Build Android APK

on:
  push:
    branches: [master, main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_native:
        description: 'Build native C++ code (requires private SDK)'
        type: boolean
        default: false
      release:
        description: 'Publish APK as GitHub Release'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  # 28.2.13676358 is pre-installed on ubuntu-24.04 runner (no download needed)
  ANDROID_NDK_VERSION: 28.2.13676358

jobs:
  # ============================================================
  # Stage 1 — Code Checkout & C++ Compilation
  # ============================================================
  native:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.build_native == 'true' }}

    steps:
      # -------- checkout dreamandroid --------
      - name: Checkout dreamandroid
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -------- checkout private SDK --------
      - name: Checkout private SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/qairt
          ssh-key: ${{ secrets.QAIRT_DEPLOY_KEY }}
          path: qairt_sdk

      # -------- NDK & build tools (check version, install only if missing) --------
      - name: Verify & set up NDK & build tools
        run: |
          # --- NDK (exact version required) ---
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          if [ -d "$NDK_PATH" ]; then
            echo "✅ NDK $ANDROID_NDK_VERSION found, skip download"
          else
            echo "⚠️  NDK $ANDROID_NDK_VERSION not found, downloading..."
            $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;$ANDROID_NDK_VERSION"
          fi
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV

          # --- cmake (require >= 3.22) ---
          CMAKE_VER=$(cmake --version 2>/dev/null | grep -oP '\d+\.\d+' | head -1 || echo "0.0")
          CMAKE_MAJOR=$(echo "$CMAKE_VER" | cut -d. -f1)
          CMAKE_MINOR=$(echo "$CMAKE_VER" | cut -d. -f2)
          if [ "$CMAKE_MAJOR" -gt 3 ] || { [ "$CMAKE_MAJOR" -eq 3 ] && [ "$CMAKE_MINOR" -ge 22 ]; }; then
            echo "✅ cmake $CMAKE_VER meets requirement (>= 3.22), skip download"
          else
            echo "⚠️  cmake $CMAKE_VER < 3.22, installing..."
            $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"
          fi

          # --- ninja ---
          if which ninja > /dev/null 2>&1; then
            echo "✅ ninja $(ninja --version 2>/dev/null || echo 'ok') found, skip install"
          else
            echo "⚠️  ninja not found, installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq ninja-build
          fi

          # --- Rust (for tokenizers-cpp) ---
          if which rustup > /dev/null 2>&1; then
            if rustup target list --installed | grep -q aarch64-linux-android; then
              echo "✅ Rust target aarch64-linux-android already installed"
            else
              echo "🔧 Installing Rust target aarch64-linux-android..."
              rustup target add aarch64-linux-android
            fi
            if which cargo-ndk > /dev/null 2>&1; then
              echo "✅ cargo-ndk found"
            else
              echo "🔧 Installing cargo-ndk..."
              cargo install cargo-ndk
            fi
          else
            echo "⚠️  rustup not found — tokenizers-cpp build may fail"
          fi

          # --- ccache ---
          sudo apt-get install -y -qq ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-ndk-${{ env.ANDROID_NDK_VERSION }}
          max-size: 2G

      # -------- cmake configure & build --------
      - name: CMake configure & build
        id: cmake-build
        working-directory: app/src/main/cpp
        run: |
          set -euo pipefail
          QNN_SDK_ROOT="${{ github.workspace }}/qairt_sdk"

          echo "NDK  : $ANDROID_NDK_ROOT"
          echo "QNN  : $QNN_SDK_ROOT"

          cmake --preset android-release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DQNN_SDK_ROOT="$QNN_SDK_ROOT" \
            2>&1 | tee ../native-build-log.txt
          cmake --build --preset android-release \
            2>&1 | tee -a ../native-build-log.txt

      # -------- upload native build log (always, independent step) --------
      - name: Upload native build log
        if: always() && steps.cmake-build.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: native-build-log
          path: app/src/main/native-build-log.txt
          retention-days: 7

      # -------- prepare native outputs for APK --------
      - name: Prepare native outputs
        run: |
          mkdir -p native-out/jniLibs/arm64-v8a/
          mkdir -p native-out/assets/
          cp app/src/main/cpp/build/android/bin/arm64-v8a/libstable_diffusion_core.so native-out/jniLibs/arm64-v8a/
          cp -r app/src/main/cpp/build/android/qnnlibs native-out/assets/

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: native-out/

  # ============================================================
  # Stage 2 — Kotlin Compile & APK Packaging (release build)
  # ============================================================
  apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: native
    if: always() && !cancelled()

    steps:
      # -------- checkout dreamandroid (no submodules needed) --------
      - name: Checkout dreamandroid
        uses: actions/checkout@v4

      # -------- validate VERSION format --------
      - name: Validate VERSION
        run: |
          VERSION=$(cat VERSION)
          if ! echo "$VERSION" | grep -qP '^\d{4}\.\d{2}\.\d{2}\.\d{2}\.\d{2}$'; then
            echo "❌ VERSION format invalid: '$VERSION'"
            echo "   Expected format: YYYY.MM.DD.HH.mm (e.g. 2026.06.12.06.00)"
            exit 1
          fi
          echo "✅ VERSION: $VERSION"

      # -------- JDK & Android SDK (check version, install only if missing) --------
      - name: Verify JDK
        id: jdk
        run: |
          JAVAC_VER=$(javac -version 2>&1 | grep -oP '\d+' | head -1)
          echo "System javac version: $JAVAC_VER"
          if [ "$JAVAC_VER" -ge 17 ] 2>/dev/null; then
            echo "✅ JDK $JAVAC_VER meets requirement (>= 17), skip install"
            echo "need_jdk=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️  JDK $JAVAC_VER < 17, needs install"
            echo "need_jdk=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.jdk.outputs.need_jdk == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify & set up Android SDK
        run: |
          TO_INSTALL=""
          PLATFORM_DIR="$ANDROID_SDK_ROOT/platforms/android-36"
          BT_DIR="$ANDROID_SDK_ROOT/build-tools/36.0.0"

          if [ -d "$PLATFORM_DIR" ]; then
            echo "✅ platforms;android-36 found, skip download"
          else
            echo "⚠️  platforms;android-36 not found"
            TO_INSTALL="$TO_INSTALL platforms;android-36"
          fi

          if [ -d "$BT_DIR" ]; then
            echo "✅ build-tools;36.0.0 found, skip download"
          else
            echo "⚠️  build-tools;36.0.0 not found"
            TO_INSTALL="$TO_INSTALL build-tools;36.0.0"
          fi

          if [ -n "$TO_INSTALL" ]; then
            echo "Installing:$TO_INSTALL"
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
            $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install $TO_INSTALL
          fi

      # -------- download native outputs (only if native job succeeded) --------
      - name: Download native artifacts
        if: needs.native.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: native-libs

      - name: Merge native outputs
        if: needs.native.result == 'success'
        run: |
          mkdir -p app/src/main/jniLibs/
          mkdir -p app/src/main/assets/
          cp -r jniLibs app/src/main/
          cp -r assets app/src/main/

      # -------- gradle build --------
      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Gradle assemble
        id: gradle-build
        run: |
          set -euo pipefail
          ./gradlew assembleBasicRelease -x ktlintCheck -x detekt --info 2>&1 | tee build-log.txt

      # -------- upload APK (only on success, independent step) --------
      - name: Upload APK
        if: steps.gradle-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dreamandroid-APK
          path: app/build/outputs/apk/basic/release/*.apk
          retention-days: 30

      # -------- upload build log (always, independent step) --------
      - name: Upload build log
        if: always() && steps.gradle-build.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7

  # ============================================================
  # Stage 3 — Publish GitHub Release (tag push or manual trigger)
  # ============================================================
  github-release:
    runs-on: ubuntu-24.04
    needs: [native, apk]
    if: |
      always() &&
      !cancelled() &&
      (needs.native.result == 'success' || needs.native.result == 'skipped') &&
      needs.apk.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true')

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: dreamandroid-APK

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dreamandroid_armv8a_*.apk
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
