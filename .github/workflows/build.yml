name: Build Android APK

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_native:
        description: 'Build native C++ code (requires QNN SDK)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_VERSION: 28.0.13004108

    steps:
      # ============================================================
      # Checkout
      # ============================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ============================================================
      # JDK 17
      # ============================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ============================================================
      # Android SDK & NDK
      # ============================================================
      - name: Install Android SDK packages
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Set ANDROID_NDK_ROOT
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV

      # ============================================================
      # Native Build Dependencies (ninja, ccache)
      # ============================================================
      - name: Install native build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-ndk-${{ env.ANDROID_NDK_VERSION }}
          max-size: 2G

      # ============================================================
      # Native C++ Build (conditional - requires QNN SDK)
      # ============================================================
      - name: Build native C++ libraries
        if: ${{ github.event.inputs.build_native == 'true' }}
        env:
          QNN_SDK_ROOT: ${{ secrets.QNN_SDK_ROOT }}
        working-directory: app/src/main/cpp
        run: |
          if [ -z "$QNN_SDK_ROOT" ]; then
            echo "::error::QNN_SDK_ROOT secret is not set. Native build requires Qualcomm QNN SDK."
            exit 1
          fi
          if [ ! -d "$QNN_SDK_ROOT" ]; then
            echo "::error::QNN SDK not found at $QNN_SDK_ROOT"
            exit 1
          fi

          echo "Building native libraries with NDK: $ANDROID_NDK_ROOT"
          echo "QNN SDK: $QNN_SDK_ROOT"

          cmake --preset android-release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DQNN_SDK_ROOT="$QNN_SDK_ROOT"

          cmake --build --preset android-release

          # Copy outputs to locations expected by Gradle
          mkdir -p ../jniLibs/arm64-v8a/
          mkdir -p ../assets/
          cp ./build/android/bin/arm64-v8a/libstable_diffusion_core.so ../jniLibs/arm64-v8a/
          cp -r ./build/android/qnnlibs ../assets/

      # ============================================================
      # Gradle Build
      # ============================================================
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Build Release APK
        run: ./gradlew assembleBasicRelease -x ktlintCheck -x detekt

      # ============================================================
      # Upload APK Artifacts
      # ============================================================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: dreamandroid-release-APK
          path: app/build/outputs/apk/basic/release/*.apk
          retention-days: 30
