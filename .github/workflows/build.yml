name: Build Android APK

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      build_native:
        description: 'Build native C++ code (requires private SDK)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  # 28.2.13676358 is pre-installed on ubuntu-24.04 runner (no download needed)
  ANDROID_NDK_VERSION: 28.2.13676358

jobs:
  # ============================================================
  # Stage 1 — Code Checkout & C++ Compilation
  # ============================================================
  native:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: ${{ github.event.inputs.build_native == 'true' }}

    steps:
      # -------- checkout dreamandroid --------
      - name: Checkout dreamandroid
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -------- checkout private SDK --------
      - name: Checkout private SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/qairt
          ssh-key: ${{ secrets.QAIRT_DEPLOY_KEY }}
          path: qairt_sdk

      # -------- NDK & build tools (pre-installed on ubuntu-24.04) --------
      - name: Verify NDK & set up build tools
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION"
          if [ -d "$NDK_PATH" ]; then
            echo "✅ NDK $ANDROID_NDK_VERSION found (pre-installed)"
          else
            echo "⚠️  NDK $ANDROID_NDK_VERSION not found, downloading..."
            $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;$ANDROID_NDK_VERSION"
          fi
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV
          echo "System cmake: $(cmake --version | head -1)"
          which ninja || sudo apt-get install -y -qq ninja-build
          sudo apt-get install -y -qq ccache

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-ndk-${{ env.ANDROID_NDK_VERSION }}
          max-size: 2G

      # -------- cmake configure & build --------
      - name: CMake configure & build
        working-directory: app/src/main/cpp
        run: |
          QNN_SDK_ROOT="${{ github.workspace }}/qairt_sdk"

          echo "NDK  : $ANDROID_NDK_ROOT"
          echo "QNN  : $QNN_SDK_ROOT"

          cmake --preset android-release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DQNN_SDK_ROOT="$QNN_SDK_ROOT"
          cmake --build --preset android-release

      # -------- prepare native outputs for APK --------
      - name: Prepare native outputs
        run: |
          mkdir -p native-out/jniLibs/arm64-v8a/
          mkdir -p native-out/assets/
          cp app/src/main/cpp/build/android/bin/arm64-v8a/libstable_diffusion_core.so native-out/jniLibs/arm64-v8a/
          cp -r app/src/main/cpp/build/android/qnnlibs native-out/assets/

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: native-out/

  # ============================================================
  # Stage 2 — Kotlin Compile & APK Packaging
  # ============================================================
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: native
    if: always() && !cancelled()

    steps:
      # -------- checkout dreamandroid (no submodules needed) --------
      - name: Checkout dreamandroid
        uses: actions/checkout@v4

      # -------- JDK & Android SDK (pre-installed on ubuntu-24.04) --------
      - name: Verify JDK & Android SDK
        run: |
          echo "JDK: $(javac -version 2>&1)"  # JDK 17 is default
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          echo "--- Installed platforms ---"
          ls $ANDROID_SDK_ROOT/platforms/
          echo "--- Installed build-tools ---"
          ls $ANDROID_SDK_ROOT/build-tools/

      # -------- download native outputs (only if native job succeeded) --------
      - name: Download native artifacts
        if: needs.native.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: native-libs

      - name: Merge native outputs
        if: needs.native.result == 'success'
        run: |
          mkdir -p app/src/main/jniLibs/
          mkdir -p app/src/main/assets/
          cp -r jniLibs app/src/main/
          cp -r assets app/src/main/

      # -------- gradle build --------
      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Gradle assemble
        id: gradle-build
        run: ./gradlew assembleBasicRelease -x ktlintCheck -x detekt --info 2>&1 | tee build-log.txt

      # -------- upload build log (always, even on failure) --------
      - name: Upload build log
        if: always() && steps.gradle-build.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7

      # -------- upload APK (only on success) --------
      - name: Upload APK
        if: steps.gradle-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dreamandroid-APK
          path: app/build/outputs/apk/basic/release/*.apk
          retention-days: 30
